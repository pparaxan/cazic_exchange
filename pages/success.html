<!DOCTYPE html>
<html>

<head>
    <title>Cazic</title>
    <link rel="stylesheet" href="/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Autour+One&family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <link rel="icon" href="/cazic.svg" type="image/svg+xml">
    <meta name="darkreader-lock">
</head>

<body>
    <div class="bg">
        <svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
        <defs>
            <linearGradient id="xanGradient" x1="59%" y1="0%" x2="41%" y2="100%">
                <stop offset="0%" stop-color="#cdb4db"/>
                <stop offset="100%" stop-color="#ffafcc"/>
            </linearGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#xanGradient)"/>
    </svg>
    </div>

    <section>
        <div class="logo">
            <img src="/cazic.svg" alt="C">
            <span class="logo-text">azic</span>
        </div>
        <p>A FOSS music player built with simplicity in mind.</p>
        <hr>
        <h2>SoundCloud has been authenticated successfully!</h2>
        <p>You can now close this tab and return to the music player.</p>
        <pre id="status">Forwarding token to Cazic...</pre>
    </section>

    <script>
        window.__CAZIC_CALLBACK_URL__ = __CAZIC_CALLBACK_URL__;
        window.__CAZIC_PAYLOAD__ = __PAYLOAD__;
    </script>

    <script src="/success.js"></script>
</body>

</html>
